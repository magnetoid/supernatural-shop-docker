version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    container_name: supernatural-postgres
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa_secret
      POSTGRES_DB: supernatural_shop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: supernatural-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supernatural-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medusa:medusa_secret@postgres:5432/supernatural_shop?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret
      COOKIE_SECRET: supersecret
      NODE_ENV: production
      MEDUSA_ADMIN_ONBOARDING_TYPE: nextjs
      STORE_CORS: https://supernatural-shop.com
      ADMIN_CORS: https://backend.supernatural-shop.com
      AUTH_CORS: https://backend.supernatural-shop.com,https://supernatural-shop.com
  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://backend.supernatural-shop.com
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_160e17723e7311a2b1ddbb0ace5e0c6c15a422364f39d1a117bb1989cae8ed03
    container_name: supernatural-storefront
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://backend.supernatural-shop.com
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_160e17723e7311a2b1ddbb0ace5e0c6c15a422364f39d1a117bb1989cae8ed03
    depends_on:
      - backend
volumes:
  postgres_data:
  redis_data:
